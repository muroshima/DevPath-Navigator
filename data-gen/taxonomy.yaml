# DevPath Navigator — Taxonomy v1 (frozen 2026-06-10)
#
# This file is the single source of truth for roles, seniority levels, and tech tokens.
# Data generation, frontend dropdowns, and the agent's profile normalizer all read this.
#
# Token naming convention:
#   - roles: bare role name (e.g. "backend", "ml_engineer")
#   - tech:  "<category>.<tool>" (e.g. "lang.python", "infra.kubernetes")
#   - seniority: bare level name
# When embedding, these are concatenated into a single vocabulary
# (the prefix prevents collisions between same-named items in different categories).

version: 1
frozen_at: "2026-06-10"

roles:
  - backend
  - frontend
  - fullstack
  - mobile
  - sre
  - platform
  - data_engineer
