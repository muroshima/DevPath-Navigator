name: CI

# Third-party actions are pinned to immutable commit SHAs (with the tag
# version annotated in a trailing comment for readability). Pinning to
# tags is convenient but exposes the workflow to supply-chain attacks if
# the publisher's release pipeline is ever compromised — the tag pointer
# can be quietly repointed. Commit SHAs are immutable.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Lint & test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q

  frontend:
    name: Build (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      # Cache the browser binary keyed on the npm lockfile so a
      # @playwright/test version bump invalidates it. `--with-deps`
      # is intentionally omitted: ubuntu-latest already ships the
      # OS libs Chromium needs.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    # gitleaks-action calls the pulls/:n/commits REST endpoint to scope its
    # diff on PR runs; without contents:read + pull-requests:read it gets a
    # 403 "Resource not accessible by integration" and the job fails.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
